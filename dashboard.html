
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
body{background:#f0f2f5;color:#1a1a2e}
.dashboard{max-width:1400px;margin:0 auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;flex-wrap:wrap}
.header h1{font-size:22px;font-weight:600;color:#1a1a2e}
.header .subtitle{font-size:13px;color:#888}
.tabs{display:flex;gap:4px;margin:16px 0;flex-wrap:wrap}
.tab-btn{padding:10px 20px;border:none;border-radius:10px;background:#e8eaef;color:#555;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.tab-btn:hover{background:#d0d4de}
.tab-btn.active{background:#667eea;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}
.tab-panel{display:none}.tab-panel.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-card .label{font-size:12px;color:#888;margin-bottom:4px}
.kpi-card .value{font-size:24px;font-weight:700;color:#1a1a2e}
.kpi-card .sub{font-size:12px;color:#999;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-card h3{font-size:14px;font-weight:600;color:#444;margin-bottom:12px}
.chart-card.full{grid-column:1/-1}
.chart-card .chart-box{height:300px}
.chart-card .chart-box.tall{height:400px}
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.data-table th{background:#f8f9fc;padding:8px 12px;text-align:right;font-weight:600;color:#555;border-bottom:2px solid #e8eaef}
.data-table th:first-child{text-align:left}
.data-table td{padding:8px 12px;text-align:right;border-bottom:1px solid #f0f2f5;color:#333;font-size:12px}
.data-table td:first-child{text-align:left;font-weight:500}
.data-table tr:hover td{background:#f8f9ff}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{text-align:center;font-size:18px;color:#333;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:#667eea}
.login-box button{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:background .2s}
.login-box button:hover{background:#5a6fd6}
.login-box .error{color:#ef4444;font-size:12px;text-align:center;margin-bottom:8px;display:none}
.section-title{font-size:15px;font-weight:600;color:#444;margin:20px 0 12px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}
</style>
</head>

function init(){
  const tabs=[{id:'overview',label:'经营总览'},{id:'june',label:'6月进度'},{id:'platform',label:'平台分析'}];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab-btn" data-tab="${t.id}">📊 ${t.label}</button>`).join('');
  document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    setTimeout(()=>{document.querySelectorAll('[data-chart]').forEach(el=>{try{echarts.getInstanceByDom(el)?.resize()}catch(e){}})},100);
  })});
  document.getElementById('panels').innerHTML=tabs.map(t=>`<div class="tab-panel" id="panel-${t.id}"></div>`).join('');
  renderOverview();renderJune();renderPlatform();
  document.querySelector('.tab-btn').click();
}

function renderOverview(){
  const ms=MONTHLY;const ts=ms.reduce((a,e)=>a+e.total_sales,0);const tm=ms.reduce((a,e)=>a+e.total_margin,0);const mr=ts>0?tm/ts:0;const l5=ms[ms.length-1];
  const p=document.getElementById('panel-overview');
  p.innerHTML=`<div class="kpi-row"><div class="kpi-card"><div class="label">1-5月累计销售额</div><div class="value" style="color:#3b82f6">${fmt(ts)}</div></div><div class="kpi-card"><div class="label">1-5月累计毛利润</div><div class="value" style="color:#22c55e">${fmt(tm)}</div></div><div class="kpi-card"><div class="label">综合毛利率</div><div class="value" style="color:${mr>0.15?'#22c55e':'#f59e0b'}">${fmtPct(mr)}</div></div><div class="kpi-card"><div class="label">5月销售额</div><div class="value" style="color:#3b82f6">${fmt(l5.total_sales)}</div><div class="sub">环比 ${ts>0?((l5.total_sales/ms[ms.length-2].total_sales-1)*100).toFixed(0)+'%':'-'}</div></div></div><div class="chart-grid"><div class="chart-card full"><h3>📊 月度销售趋势</h3><div style="display:flex;flex-wrap:wrap;gap:12px"><img src="${CHART1}" style="max-width:48%;flex:1;border-radius:8px"><img src="${CHART2}" style="max-width:48%;flex:1;border-radius:8px"></div></div><div class="chart-card"><h3>🥧 平台销售占比</h3><div class="chart-box" id="ov-pie" data-chart="1"></div></div><div class="chart-card"><h3>📈 月度毛利率趋势</h3><div class="chart-box" id="ov-mr" data-chart="1"></div></div></div>`;
  const months=ms.map(e=>e.month+'月');const mrates=ms.map(e=>+(e.margin_rate*100).toFixed(1));
  echarts.init(document.getElementById('ov-pie')).setOption({tooltip:{formatter:p=>p.name+': '+fmt(p.value)+' ('+p.percent.toFixed(1)+'%)'},series:[{type:'pie',radius:['35%','65%'],data:PLAT_PIE,label:{formatter:'{b}\n{d}%',fontSize:10}}]});
  echarts.init(document.getElementById('ov-mr')).setOption({tooltip:{trigger:'axis'},grid:{left:50,right:20,top:20,bottom:30},xAxis:{type:'category',data:months},yAxis:{type:'value',axisLabel:{formatter:'{value}%'},min:0},series:[{type:'line',data:mrates,smooth:true,lineStyle:{color:'#22c55e',width:3},symbol:'circle',itemStyle:{color:'#22c55e'},label:{show:true,formatter:p=>p.value+'%',fontSize:10},areaStyle:{color:'rgba(34,197,94,0.1)'}}]});
}

function renderJune(){
  const jc=JUNE_COMPANY,jp=JUNE_PLATS;const js=jc.sales_ytd||0,jt=jc.month_target||0,jr=Math.max(jt-js,0);const jm=jc.margin_ytd||0,jpr=jc.promo_ratio||0,jprog=jc.progress_pct||0;
  const p=document.getElementById('panel-june');
  p.innerHTML=`<div class="kpi-row"><div class="kpi-card"><div class="label">6月目标</div><div class="value" style="color:#3b82f6">${fmt(jt)}</div></div><div class="kpi-card"><div class="label">已完成</div><div class="value" style="color:#22c55e">${fmt(js)}</div><div class="sub">达成率 ${(jprog*100).toFixed(1)}%</div></div><div class="kpi-card"><div class="label">剩余</div><div class="value" style="color:#f59e0b">${fmt(jr)}</div><div class="sub">日均需 ${fmt(jr/18)}</div></div><div class="kpi-card"><div class="label">毛利累计</div><div class="value" style="color:#22c55e">${fmt(jm)}</div></div><div class="kpi-card"><div class="label">推广费占比</div><div class="value" style="color:${jpr*100>25?'#ef4444':'#22c55e'}">${(jpr*100).toFixed(1)}%</div></div><div class="kpi-card"><div class="label">时间进度</div><div class="value">${(12/30*100).toFixed(1)}%</div></div></div><div class="chart-grid"><div class="chart-card full"><h3>🎯 6月目标</h3><div class="chart-box tall" id="jn-gauge" data-chart="1"></div></div><div class="chart-card full"><img src="${CHART5}" style="max-width:100%;border-radius:8px"></div></div>`;
  echarts.init(document.getElementById('jn-gauge')).setOption({series:[{type:'gauge',startAngle:180,endAngle:0,min:0,max:100,axisLine:{lineStyle:{width:24,color:[[0.3,'#ef4444'],[0.6,'#f59e0b'],[1,'#22c55e']]}},pointer:{length:'55%',width:5},detail:{fontSize:24,fontWeight:'bold',formatter:p=>p.value.toFixed(1)+'%'},title:{offsetCenter:[0,'60%'],fontSize:13},data:[{value:jprog*100,name:'完成率'}]}]});
  let ht='<div style="margin-top:16px"><h3 class="section-title">各店铺6月明细</h3><table class="data-table"><thead><tr><th>平台</th><th>店铺</th><th>已完成</th><th>推广费</th><th>进度</th></tr></thead><tbody>';
  jp.filter(p=>p.target>0).forEach(p=>{ht+=`<tr><td>${p.platform}</td><td>${p.store}</td><td>${fmt(p.sales_ytd)}</td><td>${fmt(p.promo_ytd)}</td><td>${(p.progress*100).toFixed(1)}%</td></tr>`;});
  ht+='</tbody></table></div>';p.innerHTML+=ht;
}

function renderPlatform(){
  const ms=MONTHLY;const p=document.getElementById('panel-platform');
  p.innerHTML=`<div class="chart-row" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center"><img src="${CHART3}" style="max-width:48%;border-radius:8px"><img src="${CHART4}" style="max-width:48%;border-radius:8px"></div><table class="data-table"><thead><tr><th>月份</th><th>总销售</th><th>总毛利</th><th>毛利率</th><th>天猫</th><th>京东</th><th>抖音</th><th>拼多多</th></tr></thead><tbody>`;
  ms.forEach(m=>{p.innerHTML+=`<tr><td>${m.month}月</td><td>${fmt(m.total_sales)}</td><td>${fmt(m.total_margin)}</td><td>${fmtPct(m.margin_rate)}</td><td>${fmt(m.tmall_sales)}</td><td>${fmt(m.jd_sales)}</td><td>${fmt(m.tt_sales)}</td><td>${fmt(m.pdd_sales)}</td></tr>`;});
  p.innerHTML+='</tbody></table>';
}

</script>
</body>
