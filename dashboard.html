<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
body{background:#f0f2f5;color:#1a1a2e}
.dashboard{max-width:1400px;margin:0 auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:22px;font-weight:600;color:#1a1a2e}
.header h1 span{color:#667eea;margin-right:8px}
.header .subtitle{font-size:13px;color:#888;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:10px 20px;border:none;border-radius:10px;background:#e8eaef;color:#555;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.tab-btn:hover{background:#d0d4de}
.tab-btn.active{background:#667eea;color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-card .label{font-size:12px;color:#888;margin-bottom:4px}
.kpi-card .value{font-size:24px;font-weight:700;color:#1a1a2e}
.kpi-card .value.green{color:#22c55e}
.kpi-card .value.red{color:#ef4444}
.kpi-card .value.blue{color:#3b82f6}
.kpi-card .sub{font-size:12px;color:#999;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-card h3{font-size:14px;font-weight:600;color:#444;margin-bottom:12px}
.chart-card.full{grid-column:1/-1}
.chart-card .chart-box{height:300px}
.chart-card .chart-box.tall{height:400px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#f8f9fc;padding:8px 12px;text-align:right;font-weight:600;color:#555;border-bottom:2px solid #e8eaef}
.data-table th:first-child{text-align:left}
.data-table td{padding:8px 12px;text-align:right;border-bottom:1px solid #f0f2f5;color:#333}
.data-table td:first-child{text-align:left;font-weight:500}
.data-table tr:hover td{background:#f8f9ff}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function init() {
  const d = DATA;
  const platforms = d.platforms;
  const companyPlatform = platforms[0]; // 公司合计
  const subPlatforms = platforms.slice(1);
  
  const tabs = [
    { id: 'overview', label: '📈 经营总览' },
    { id: 'platform', label: '🏪 平台对比' },
    { id: 'product', label: '📦 产品分析' },
    { id: 'daily', label: '📅 每日趋势' },
    { id: 'detail', label: '📋 数据明细' },
  ];
  
  document.getElementById('tabs').innerHTML = tabs.map(t => `<button class="tab-btn" data-tab="${t.id}">${t.label}</button>`).join('');
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      setTimeout(() => { document.querySelectorAll('.chart-box[data-chart]').forEach(el => { try { echarts.getInstanceByDom(el).resize(); } catch(e) {} }); }, 100);
    });
  });
  
  document.getElementById('panels').innerHTML = tabs.map(t => `<div class="tab-panel" id="panel-${t.id}"></div>`).join('');
  
  renderOverview(d, companyPlatform, subPlatforms);
  renderPlatform(d, companyPlatform, subPlatforms);
  renderProduct(d, companyPlatform, subPlatforms);
  renderDaily(d, subPlatforms);
  renderDetail(d, companyPlatform, subPlatforms);
  
  document.querySelector('.tab-btn').click();
}

function num(v) { return typeof v === 'number' ? v : (parseFloat(v) || 0); }
function fmt(v) { v = num(v); if(v>=100000000) return (v/100000000).toFixed(2)+'亿'; if(v>=10000) return (v/10000).toFixed(2)+'万'; return v.toFixed(2); }
function fmtPct(v) { return (num(v)*100).toFixed(1)+'%'; }

function renderOverview(d, cp, subP) {
  const panel = document.getElementById('panel-overview');
  const monthly = d.monthly || [];
  
  let totalSales=0, totalOrders=0, totalCost=0;
  monthly.forEach(e => { const c = e[cp]||{}; totalSales+=num(c['销售额']); totalOrders+=num(c['单数']); totalCost+=num(c['总成本']); });
  const margin = totalSales > 0 ? (totalSales-totalCost)/totalSales : 0;
  
  // Platform totals
  const platSales = {};
  monthly.forEach(e => { subP.forEach(p => { platSales[p] = (platSales[p]||0) + num((e[p]||{})['销售额']); }); });
  
  // Monthly trend
  const trend = {};
  monthly.forEach(e => { 
    const mk = e.year+'-'+String(e.month).padStart(2,'0');
    if(!trend[mk]) trend[mk] = {month:mk, total:0};
    trend[mk].total += num((e[cp]||{})['销售额']);
    subP.forEach(p => { trend[mk][p] = (trend[mk][p]||0) + num((e[p]||{})['销售额']); });
  });
  const tMonths = Object.keys(trend).sort();
  const tData = tMonths.map(m => trend[m]);
  
  panel.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">总GSV销售额</div><div class="value blue">${fmt(totalSales)}</div><div class="sub">3个月合计</div></div>
      <div class="kpi-card"><div class="label">总订单数</div><div class="value">${(totalOrders/10000).toFixed(2)}万</div></div>
      <div class="kpi-card"><div class="label">总成本</div><div class="value red">${fmt(totalCost)}</div></div>
      <div class="kpi-card"><div class="label">综合毛利率</div><div class="value ${margin>0.3?'green':(margin>0.15?'':'red')}">${fmtPct(margin)}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card full"><h3>📈 月度GSV趋势</h3><div class="chart-box tall" id="ch-trend" data-chart="1"></div></div>
      <div class="chart-card"><h3>🏪 平台GSV占比</h3><div class="chart-box" id="ch-pie" data-chart="1"></div></div>
      <div class="chart-card"><h3>📊 平台GSV排名</h3><div class="chart-box" id="ch-bar" data-chart="1"></div></div>
    </div>
  `;
  
  // Trend chart
  const c1 = echarts.init(document.getElementById('ch-trend'));
  c1.setOption({
    tooltip:{trigger:'axis'}, legend:{bottom:0}, grid:{left:60,right:20,top:20,bottom:50},
    xAxis:{type:'category', data:tMonths},
    yAxis:{type:'value', axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    series:[{type:'bar', data:tData.map(d=>Math.round(d.total)), itemStyle:{color:'#667eea',borderRadius:[4,4,0,0]}},
            {type:'line', data:tData.map(d=>Math.round(d.total)), smooth:true, lineStyle:{color:'#f59e0b',width:2}, symbol:'none'}]
  });
  
  // Pie
  const c2 = echarts.init(document.getElementById('ch-pie'));
  const pd = Object.entries(platSales).map(([k,v])=>({name:k,value:Math.round(v)})).sort((a,b)=>b.value-a.value);
  c2.setOption({
    tooltip:{formatter:p=>p.name+': '+fmt(p.value)+' ('+p.percent.toFixed(1)+'%)'},
    series:[{type:'pie', radius:['35%','65%'], data:pd, label:{formatter:'{b}\n{d}%',fontSize:10}}]
  });
  
  // Bar
  const c3 = echarts.init(document.getElementById('ch-bar'));
  c3.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}}, grid:{left:100,right:20,top:10,bottom:20},
    xAxis:{type:'value', axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    yAxis:{type:'category', data:pd.map(d=>d.name), axisLabel:{fontSize:11}},
    series:[{type:'bar', data:pd.map(d=>({value:d.value,itemStyle:{color:'#667eea'}})),
             label:{show:true,position:'right',formatter:p=>fmt(p.value)},barMaxWidth:28}]
  });
}

function renderPlatform(d, cp, subP) {
  const panel = document.getElementById('panel-platform');
  const monthly = d.monthly || [];
  
  const platMon = {};
  monthly.forEach(e => {
    const mk = e.year+'-'+String(e.month).padStart(2,'0');
    if(!platMon[mk]) platMon[mk] = {};
    subP.forEach(p => {
      const pd = e[p]||{};
      if(!platMon[mk][p]) platMon[mk][p]={sales:0,orders:0,cost:0};
      platMon[mk][p].sales += num(pd['销售额']);
      platMon[mk][p].orders += num(pd['单数']);
      platMon[mk][p].cost += num(pd['总成本']);
      platMon[mk][p].margin = platMon[mk][p].sales > 0 ? (platMon[mk][p].sales-platMon[mk][p].cost)/platMon[mk][p].sales : 0;
    });
  });
  
  const mks = Object.keys(platMon).sort();
  
  panel.innerHTML = `
    <div class="chart-grid">
      <div class="chart-card full"><h3>📊 各平台月度GSV</h3><div class="chart-box tall" id="ch-ps" data-chart="1"></div></div>
      <div class="chart-card"><h3>📉 各平台毛利率</h3><div class="chart-box" id="ch-pm" data-chart="1"></div></div>
      <div class="chart-card"><h3>📋 平台毛利率排名 (${mks[mks.length-1]||''})</h3><div class="chart-box" id="ch-pmr" data-chart="1"></div></div>
    </div>
  `;
  
  // Stacked bar
  const c1 = echarts.init(document.getElementById('ch-ps'));
  c1.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}}, legend:{bottom:0}, grid:{left:60,right:20,top:20,bottom:50},
    xAxis:{type:'category',data:mks},
    yAxis:{type:'value', axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    series: subP.map(p => ({
      name:p, type:'bar', stack:'total',
      data: mks.map(mk => Math.round(platMon[mk][p]?.sales||0)),
    }))
  });
  
  // Margin lines
  const c2 = echarts.init(document.getElementById('ch-pm'));
  c2.setOption({
    tooltip:{trigger:'axis', formatter:ps=>ps.map(pp=>pp.seriesName+': '+(pp.value||0).toFixed(1)+'%').join('<br>')},
    legend:{bottom:0}, grid:{left:50,right:20,top:20,bottom:50},
    xAxis:{type:'category',data:mks},
    yAxis:{type:'value', axisLabel:{formatter:'{value}%'}},
    series: subP.map(p => ({
      name:p, type:'line', smooth:true,
      data: mks.map(mk => +((platMon[mk][p]?.margin||0)*100).toFixed(1)),
    }))
  });
  
  // Margin rank
  const lm = mks[mks.length-1];
  const mr = subP.map(p => ({name:p, value:+((platMon[lm]?.[p]?.margin||0)*100).toFixed(1)})).sort((a,b)=>b.value-a.value);
  const c3 = echarts.init(document.getElementById('ch-pmr'));
  c3.setOption({
    tooltip:{formatter:p=>p.name+': '+p.value+'%'}, grid:{left:100,right:30,top:10,bottom:20},
    xAxis:{type:'value',axisLabel:{formatter:'{value}%'}},
    yAxis:{type:'category',data:mr.map(d=>d.name),axisLabel:{fontSize:11}},
    series:[{type:'bar',data:mr.map(d=>({value:d.value,itemStyle:{color:d.value>30?'#22c55e':(d.value>15?'#f59e0b':'#ef4444')}})),
             label:{show:true,position:'right',formatter:p=>p.value+'%'},barMaxWidth:24}]
  });
}

function renderProduct(d, cp, subP) {
  const panel = document.getElementById('panel-product');
  const pt = d.prod_totals || {};
  const products = d.products || [];
  
  panel.innerHTML = `
    <div class="kpi-row">
      ${products.map(p => {
        const t = pt[p]||{};
        return `<div class="kpi-card"><div class="label">${p}</div><div class="value blue">${fmt(t.sales)}</div><div class="sub">${(t.orders||0).toFixed(0)}单 · 毛利率${fmtPct(t.margin)}</div></div>`;
      }).join('')}
    </div>
    <div class="chart-grid">
      <div class="chart-card full"><h3>📈 产品线月度GSV趋势</h3><div class="chart-box" id="ch-pt" data-chart="1"></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>🥧 GSV占比</h3><div class="chart-box" id="ch-pp" data-chart="1"></div></div>
      <div class="chart-card"><h3>📊 产品毛利率对比</h3><div class="chart-box" id="ch-pmp" data-chart="1"></div></div>
    </div>
  `;
  
  // Product trend
  const monthly = d.monthly || [];
  const prodTrend = {};
  monthly.forEach(e => {
    const mk = e.year+'-'+String(e.month).padStart(2,'0');
    const p = e.product;
    if(!prodTrend[p]) prodTrend[p] = {};
    prodTrend[p][mk] = (prodTrend[p][mk]||0) + num((e[cp]||{})['销售额']);
  });
  const tMonths = [...new Set(monthly.map(e=>e.year+'-'+String(e.month).padStart(2,'0')))].sort();
  
  const c1 = echarts.init(document.getElementById('ch-pt'));
  c1.setOption({
    tooltip:{trigger:'axis'}, legend:{bottom:0}, grid:{left:60,right:20,top:20,bottom:50},
    xAxis:{type:'category',data:tMonths},
    yAxis:{type:'value', axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    series: products.map(p => ({
      name:p, type:'line', smooth:true, symbol:'circle',
      data: tMonths.map(mk => Math.round(prodTrend[p]?.[mk]||0)),
    }))
  });
  
  // Pie
  const pd = products.filter(p=>(pt[p]?.sales||0)>0).map(p=>({name:p, value:Math.round(pt[p].sales)})).sort((a,b)=>b.value-a.value);
  const c2 = echarts.init(document.getElementById('ch-pp'));
  c2.setOption({
    tooltip:{formatter:p=>p.name+': '+fmt(p.value)+' ('+p.percent.toFixed(1)+'%)'},
    series:[{type:'pie',radius:['35%','65%'],data:pd,label:{formatter:'{b}\n{d}%',fontSize:10}}]
  });
  
  // Margin bar
  const pmd = products.map(p=>({name:p, value:+((pt[p]?.margin||0)*100).toFixed(1)})).sort((a,b)=>b.value-a.value);
  const c3 = echarts.init(document.getElementById('ch-pmp'));
  c3.setOption({
    tooltip:{formatter:p=>p.name+': '+p.value+'%'}, grid:{left:60,right:30,top:10,bottom:20},
    xAxis:{type:'value',axisLabel:{formatter:'{value}%'}},
    yAxis:{type:'category',data:pmd.map(d=>d.name)},
    series:[{type:'bar',data:pmd.map(d=>({value:d.value,itemStyle:{color:d.value>30?'#22c55e':(d.value>15?'#f59e0b':'#ef4444')}})),
             label:{show:true,position:'right',formatter:p=>p.value+'%'},barMaxWidth:22}]
  });
}

function renderDaily(d, subP) {
  const panel = document.getElementById('panel-daily');
  const daily = d.daily_data || [];
  
  // Compute daily total GSV from daily_data
  const dailyTotal = {};
  const dailyProd = {};
  daily.forEach(e => {
    const date = e.date;
    const p = e.product;
    if(!dailyTotal[date]) dailyTotal[date]=0;
    if(!dailyProd[p]) dailyProd[p]={};
    
    // Sum all GSV-like fields
    let total = 0;
    Object.entries(e).forEach(([k,v]) => {
      if(k.includes('GSV') || k.includes('GMV') || k==='GSV' || k==='GMV') {
        total += num(v);
      }
    });
    dailyTotal[date] += total;
    dailyProd[p][date] = (dailyProd[p][date]||0) + total;
  });
  
  const dates = Object.keys(dailyTotal).sort();
  const vals = dates.map(d => Math.round(dailyTotal[d]));
  const avg = vals.length > 0 ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
  
  const products = Object.keys(dailyProd).filter(p => Object.values(dailyProd[p]).some(v=>v>0));
  
  panel.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">有数据天数</div><div class="value">${dates.length}天</div></div>
      <div class="kpi-card"><div class="label">日均GSV</div><div class="value blue">${fmt(avg)}</div></div>
      <div class="kpi-card"><div class="label">最高日GSV</div><div class="value green">${fmt(Math.max(...vals))}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card full"><h3>📈 日GSV趋势</h3><div class="chart-box tall" id="ch-dt" data-chart="1"></div></div>
      <div class="chart-card full"><h3>📊 各产品日GSV</h3><div class="chart-box tall" id="ch-dp" data-chart="1"></div></div>
    </div>
  `;
  
  const c1 = echarts.init(document.getElementById('ch-dt'));
  c1.setOption({
    tooltip:{trigger:'axis'}, grid:{left:60,right:20,top:20,bottom:60},
    xAxis:{type:'category',data:dates,axisLabel:{rotate:45,fontSize:10}},
    yAxis:{type:'value',axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    dataZoom:[{type:'inside'},{type:'slider',bottom:0}],
    series:[{type:'bar',data:vals,itemStyle:{color:'#667eea',borderRadius:[2,2,0,0]}},
            {type:'line',data:vals,smooth:true,lineStyle:{color:'#f59e0b',width:2},symbol:'none'}]
  });
  
  const c2 = echarts.init(document.getElementById('ch-dp'));
  c2.setOption({
    tooltip:{trigger:'axis'}, legend:{bottom:0}, grid:{left:60,right:20,top:20,bottom:60},
    xAxis:{type:'category',data:dates,axisLabel:{rotate:45,fontSize:10}},
    yAxis:{type:'value',axisLabel:{formatter:v=>v>=10000?(v/10000).toFixed(0)+'万':v}},
    dataZoom:[{type:'inside'}],
    series: products.map(p => ({
      name:p, type:'line', smooth:true, symbol:'none', lineStyle:{width:2},
      data: dates.map(d => Math.round(dailyProd[p]?.[d]||0)),
    }))
  });
}

function renderDetail(d, cp, subP) {
  const panel = document.getElementById('panel-detail');
  const monthly = d.monthly || [];
  
  const byMonth = {};
  monthly.forEach(e => {
    const mk = e.year+'-'+String(e.month).padStart(2,'0');
    if(!byMonth[mk]) byMonth[mk]=[];
    byMonth[mk].push(e);
  });
  
  const months = Object.keys(byMonth).sort();
  
  let html = '';
  months.forEach(mk => {
    const entries = byMonth[mk];
    html += `<h3 style="margin:16px 0 8px;font-size:15px;color:#444">${mk}</h3>`;
    html += `<table class="data-table"><thead><tr><th>产品</th>`;
    subP.forEach(p => { html += `<th colspan="2">${p}</th>`; });
    html += `<th colspan="2">合计</th></tr><tr><th></th>`;
    subP.forEach(() => { html += `<th>GSV</th><th>毛利率</th>`; });
    html += `<th>GSV</th><th>毛利率</th></tr></thead><tbody>`;
    
    entries.forEach(e => {
      html += `<tr><td>${e.product}</td>`;
      subP.forEach(p => {
        const pd = e[p]||{};
        const s = num(pd['销售额']);
        const c = num(pd['总成本']);
        const m = s>0 ? (s-c)/s : 0;
        html += `<td>${fmt(s)}</td><td style="color:${m>0.3?'#22c55e':(m>0?'#666':'#ef4444')}">${fmtPct(m)}</td>`;
      });
      const cp_data = e[cp]||{};
      const ts = num(cp_data['销售额']);
      const tc = num(cp_data['总成本']);
      const tm = ts>0 ? (ts-tc)/ts : 0;
      html += `<td style="font-weight:600">${fmt(ts)}</td><td style="font-weight:600;color:${tm>0.3?'#22c55e':(tm>0?'#666':'#ef4444')}">${fmtPct(tm)}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  });
  
  panel.innerHTML = html;
}
</script>
